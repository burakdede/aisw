[package]
name = "aisw"
version = "0.1.0"
edition = "2021"
rust-version = "1.80"
description = "Manage multiple accounts for Claude Code, Codex CLI, and Gemini CLI"
license = "MIT"
repository = "https://github.com/burakdede/aisw"
keywords = ["cli", "claude", "codex", "gemini", "account-switcher"]
categories = ["command-line-utilities"]

[[bin]]
name = "aisw"
path = "src/main.rs"

[lib]
name = "aisw"
path = "src/lib.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
dirs = "5"
dialoguer = "0.11"
console = "0.15"
chrono = { version = "0.4", features = ["serde"] }
which = "7"
anyhow = "1"

[dev-dependencies]
tempfile = "3"
assert_cmd = "2"
predicates = "3"

[profile.release]
strip = true
opt-level = "z"
lto = true
codegen-units = 1
