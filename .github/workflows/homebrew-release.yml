name: Update Homebrew Tap

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish to Homebrew tap (e.g. v0.3.3)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  update-homebrew-tap:
    name: Update Formula In Tap
    runs-on: ubuntu-latest
    env:
      REPO: ${{ github.repository }}
      TAG: ${{ github.event.release.tag_name || inputs.tag }}
      TAP_REPO: burakdede/homebrew-tap
      GH_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

    steps:
      - name: Validate Homebrew token
        shell: bash
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "Skipping Homebrew update: HOMEBREW_TAP_GITHUB_TOKEN is not configured."
            echo "SKIP_HOMEBREW=1" >> "$GITHUB_ENV"
          fi

      - name: Validate release tag
        shell: bash
        run: |
          if [ "${SKIP_HOMEBREW:-0}" = "1" ]; then
            exit 0
          fi
          case "$TAG" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *)
              echo "Skipping Homebrew update: unsupported tag format '$TAG'"
              echo "SKIP_HOMEBREW=1" >> "$GITHUB_ENV"
              exit 0
              ;;
          esac
          echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"

      - name: Download release checksums
        if: env.SKIP_HOMEBREW != '1'
        shell: bash
        run: |
          set -euo pipefail
          BASE="https://github.com/${REPO}/releases/download/${TAG}"

          curl -fsSL "${BASE}/aisw-aarch64-apple-darwin.sha256" -o darwin_arm.sha256
          curl -fsSL "${BASE}/aisw-x86_64-apple-darwin.sha256" -o darwin_amd.sha256
          curl -fsSL "${BASE}/aisw-aarch64-unknown-linux-gnu.sha256" -o linux_arm.sha256
          curl -fsSL "${BASE}/aisw-x86_64-unknown-linux-gnu.sha256" -o linux_amd.sha256

          {
            echo "SHA_DARWIN_ARM=$(tr -d '[:space:]' < darwin_arm.sha256)"
            echo "SHA_DARWIN_AMD=$(tr -d '[:space:]' < darwin_amd.sha256)"
            echo "SHA_LINUX_ARM=$(tr -d '[:space:]' < linux_arm.sha256)"
            echo "SHA_LINUX_AMD=$(tr -d '[:space:]' < linux_amd.sha256)"
          } >> "$GITHUB_ENV"

      - name: Validate checksum mapping against release binaries
        if: env.SKIP_HOMEBREW != '1'
        shell: bash
        run: |
          set -euo pipefail
          BASE="https://github.com/${REPO}/releases/download/${TAG}"

          curl -fsSL "${BASE}/aisw-aarch64-apple-darwin" -o darwin_arm.bin
          curl -fsSL "${BASE}/aisw-x86_64-apple-darwin" -o darwin_amd.bin
          curl -fsSL "${BASE}/aisw-aarch64-unknown-linux-gnu" -o linux_arm.bin
          curl -fsSL "${BASE}/aisw-x86_64-unknown-linux-gnu" -o linux_amd.bin

          check() {
            local file="$1"
            local expected="$2"
            local actual
            actual="$(sha256sum "$file" | awk '{print $1}')"
            if [ "$actual" != "$expected" ]; then
              echo "Checksum mismatch for $file"
              echo "Expected: $expected"
              echo "Actual:   $actual"
              exit 1
            fi
          }

          check darwin_arm.bin "$SHA_DARWIN_ARM"
          check darwin_amd.bin "$SHA_DARWIN_AMD"
          check linux_arm.bin "$SHA_LINUX_ARM"
          check linux_amd.bin "$SHA_LINUX_AMD"

      - name: Generate Formula
        if: env.SKIP_HOMEBREW != '1'
        shell: bash
        run: |
          cat > aisw.rb <<EOF
          class Aisw < Formula
            desc "AI and coding agent account manager and account switcher"
            homepage "https://github.com/${REPO}"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/${REPO}/releases/download/${TAG}/aisw-aarch64-apple-darwin"
                sha256 "${SHA_DARWIN_ARM}"
              else
                url "https://github.com/${REPO}/releases/download/${TAG}/aisw-x86_64-apple-darwin"
                sha256 "${SHA_DARWIN_AMD}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/${REPO}/releases/download/${TAG}/aisw-aarch64-unknown-linux-gnu"
                sha256 "${SHA_LINUX_ARM}"
              else
                url "https://github.com/${REPO}/releases/download/${TAG}/aisw-x86_64-unknown-linux-gnu"
                sha256 "${SHA_LINUX_AMD}"
              end
            end

            def install
              bin.install Dir["aisw-*"].first => "aisw"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/aisw --version")
            end
          end
          EOF

      - name: Checkout tap repository
        if: env.SKIP_HOMEBREW != '1'
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TAP_REPO }}
          token: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          path: tap

      - name: Update tap formula
        if: env.SKIP_HOMEBREW != '1'
        shell: bash
        run: |
          set -euo pipefail
          cp aisw.rb tap/Formula/aisw.rb
          cd tap

          if git diff --quiet -- Formula/aisw.rb; then
            echo "No Homebrew formula changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/aisw.rb
          git commit -m "aisw ${VERSION}"
          git push origin HEAD
