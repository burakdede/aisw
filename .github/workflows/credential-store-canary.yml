name: Credential Store Canary

on:
  workflow_dispatch:
    inputs:
      run_canary:
        description: "Run opt-in real credential-store canary tests"
        required: true
        default: false
        type: boolean

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  real-credential-store-canary:
    name: Real credential-store canary (${{ matrix.os }})
    if: ${{ inputs.run_canary }}
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Run real credential-store canary (ignored test)
        env:
          AISW_ENABLE_REAL_CREDENTIAL_STORE_CANARY: "1"
        run: cargo test --locked real_credential_store_roundtrip_canary -- --ignored --nocapture
