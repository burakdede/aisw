name: Notify aiswitcher.dev

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
  workflow_dispatch:

concurrency:
  group: notify-aiswitcher-dev
  cancel-in-progress: true

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch aiswitcher-dev deploy workflow
        env:
          GH_TOKEN: ${{ secrets.AISWITCHER_DEV_DISPATCH_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "AISWITCHER_DEV_DISPATCH_TOKEN secret is not set. Skipping." >&2
            exit 1
          fi
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/burakdede/aiswitcher-dev/actions/workflows/deploy-pages.yml/dispatches" \
            -d '{"ref":"main"}')
          echo "Dispatch responded with HTTP $status"
          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            exit 1
          fi
