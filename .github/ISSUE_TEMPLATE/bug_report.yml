name: Bug Report
description: Report a reproducible problem in aisw.
title: "[bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this.
        Please provide enough detail for us to reproduce and diagnose quickly.

  - type: checkboxes
    id: checks
    attributes:
      label: Preconditions
      options:
        - label: I read existing issues and this does not appear to be a duplicate.
          required: true
        - label: I can reproduce this on the latest released version.
          required: true
        - label: I understand logs and credentials in this issue must be redacted.
          required: true

  - type: dropdown
    id: issue_type
    attributes:
      label: Issue Type
      options:
        - Runtime failure (command exits non-zero)
        - Incorrect behavior/output
        - UX/DX regression
        - Performance issue
        - Installation/upgrade issue
        - Documentation mismatch
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One clear sentence describing the problem and impact.
      placeholder: "`aisw use` reports success, but the active profile does not change."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Provide deterministic steps with exact commands.
      placeholder: |
        1. Run `aisw init --yes`
        2. Run `aisw add claude work --api-key ...`
        3. Run `aisw use claude work`
        4. Observe ...
      render: bash
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: "What should happen?"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: "What actually happened?"
    validations:
      required: true

  - type: textarea
    id: command_output
    attributes:
      label: Command Output
      description: Paste full output for failing commands. Redact secrets.
      render: text
    validations:
      required: true

  - type: textarea
    id: doctor_output
    attributes:
      label: Diagnostic Output
      description: Run and paste `aisw doctor`.
      render: text
      placeholder: |
        $ aisw doctor
        ...
    validations:
      required: true

  - type: input
    id: aisw_version
    attributes:
      label: aisw Version
      description: Output of `aisw --version`.
      placeholder: "aisw 0.3.2"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS and Version
      placeholder: "macOS 15.4 / Ubuntu 24.04 / Windows 11"
    validations:
      required: true

  - type: input
    id: shell
    attributes:
      label: Shell
      placeholder: "zsh 5.9 / bash 5.2 / fish 3.7"
    validations:
      required: true

  - type: dropdown
    id: install_method
    attributes:
      label: Install Method
      options:
        - install.sh
        - cargo install
        - Homebrew
        - local build from source
        - other
    validations:
      required: true

  - type: checkboxes
    id: tools
    attributes:
      label: Affected Tool Integrations
      description: Select all that apply.
      options:
        - label: Claude
        - label: Codex
        - label: Gemini
        - label: Not tool-specific

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Optional context such as recent changes, workarounds, or related issues.

